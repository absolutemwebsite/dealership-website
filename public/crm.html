<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>CRM — Absolute Motor Cars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .crm-shell { display: none; min-height: 100vh; }
  .crm-shell.logged-in { display: flex; }
  .crm-nav { width: 220px; background: var(--panel); border-right: 1px solid var(--line); padding: 28px 0; display: flex; flex-direction: column; }
  .crm-nav h3 { padding: 0 24px 20px; font-family: 'Oswald'; font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; color: var(--red); font-weight: 600; }
  .crm-nav a { display: flex; align-items: center; gap: 8px; padding: 10px 24px; font-family: 'Oswald'; font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); border-left: 2px solid transparent; cursor: pointer; transition: .2s; }
  .crm-nav a:hover, .crm-nav a.active { color: #fff; border-left-color: var(--red); background: rgba(224,18,12,.06); }
  .crm-nav .owner-only { display: none; }
  .crm-nav.is-owner .owner-only { display: flex; }
  .crm-nav .logout-row { padding: 16px 24px; border-top: 1px solid var(--line); font-size: .78rem; color: var(--muted); font-family: 'Inter'; margin-top: auto; }
  .crm-main { flex: 1; padding: 36px 40px; overflow-x: auto; }
  .crm-tab { display: none; }
  .crm-tab.active { display: block; }

  /* KPIs */
  .kpi-row { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .kpi { background: var(--panel); border: 1px solid var(--line); padding: 18px 24px; min-width: 140px; }
  .kpi .label { font-family: 'Oswald'; font-size: .66rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .kpi .value { font-family: 'Oswald'; font-size: 1.6rem; font-weight: 600; color: var(--red); margin-top: 4px; }

  /* Production cards */
  .prod-card { background: var(--panel); border: 1px solid var(--line); padding: 20px 24px; margin-bottom: 12px; position: relative; border-left: 3px solid var(--line); }
  .prod-card.loc-dealership { border-left-color: #22c55e; }
  .prod-card.loc-auction { border-left-color: #f59e0b; }
  .prod-card.loc-mechanic { border-left-color: #3b82f6; }
  .prod-card .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .prod-card h4 { font-family: 'Oswald'; font-size: 1.05rem; font-weight: 600; text-transform: uppercase; color: var(--chrome-1); }
  .prod-card .sub { font-size: .8rem; color: var(--muted); font-family: 'Inter'; margin-top: 3px; }
  .prod-card .meta-row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .prod-card .loc-sel select { padding: 5px 10px; border: 1px solid var(--line); background: var(--black); color: #fff; font-family: 'Inter'; font-size: .78rem; }
  .prod-card .chk { cursor: pointer; font-family: 'Inter'; font-size: .78rem; }
  .prod-card .chk.done { color: #22c55e; font-weight: 600; }
  .prod-card .chk.pending { color: var(--muted); }
  .prod-card .actions { display: flex; flex-direction: column; gap: 6px; }
  .prod-card details { margin-top: 10px; }
  .prod-card summary { cursor: pointer; font-family: 'Oswald'; font-size: .7rem; letter-spacing: .08em; text-transform: uppercase; color: var(--red); font-weight: 600; }
  .cost-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 4px; margin-top: 8px; }
  .cost-line { display: flex; justify-content: space-between; font-family: 'Inter'; font-size: .78rem; padding: 3px 8px; background: var(--black); }

  /* Ledger / Sold tables */
  .wide-table-wrap { overflow-x: auto; }
  .wide-table { width: max-content; min-width: 100%; border-collapse: collapse; font-family: 'Inter'; font-size: .8rem; }
  .wide-table th { padding: 10px 12px; font-family: 'Oswald'; font-size: .66rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--line); text-align: right; white-space: nowrap; }
  .wide-table th:first-child { text-align: left; }
  .wide-table td { padding: 7px 12px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
  .wide-table td:first-child { text-align: left; font-weight: 600; }
  .wide-table tr.total td { font-weight: 700; border-top: 2px solid var(--red); }

  /* Inspection */
  .insp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; margin: 8px 0; }
  .insp-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; background: var(--black); font-family: 'Inter'; font-size: .7rem; cursor: pointer; user-select: none; border: 1px solid transparent; }
  .insp-item:hover { border-color: var(--line); }
  .insp-item.C { color: #22c55e; }
  .insp-item.N { color: #ef4444; }
  .insp-item.NA { color: var(--muted); }
  .insp-section { font-family: 'Oswald'; font-size: .68rem; letter-spacing: .06em; text-transform: uppercase; color: var(--chrome-2); font-weight: 600; margin: 10px 0 4px; }

  /* Edit form */
  .edit-form { background: var(--panel); border: 1px solid var(--line); padding: 28px; margin-bottom: 20px; }
  .edit-form h3 { font-family: 'Oswald'; font-size: 1.1rem; text-transform: uppercase; color: var(--chrome-1); margin-bottom: 16px; }
  .ef-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .ef-grid .field { margin: 0; }
  .ef-grid .field label { display: block; font-family: 'Oswald'; font-size: .66rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .ef-grid .field input, .ef-grid .field select { width: 100%; padding: 8px 10px; border: 1px solid var(--line); background: var(--black); color: #fff; font-family: 'Inter'; font-size: .82rem; }
  .ef-grid .field input:focus, .ef-grid .field select:focus { outline: none; border-color: var(--red); }

  @media(max-width:768px) {
    .crm-shell.logged-in { flex-direction: column; }
    .crm-nav { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px 8px; }
    .crm-nav a { padding: 8px 14px; font-size: .72rem; border-left: none; border-bottom: 2px solid transparent; white-space: nowrap; }
    .crm-nav a.active { border-bottom-color: var(--red); }
    .crm-main { padding: 20px 16px; }
    .insp-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="crm-login-page">
  <div class="login-card">
    <a class="brand"><img src="/logo.png" alt="AMC"></a>
    <h2>CRM Login</h2>
    <form id="crm-login-form">
      <div class="field"><label>Username</label><input type="text" name="username" required autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" name="password" required autocomplete="current-password"></div>
      <div class="alert" id="crm-login-alert"></div>
      <button type="submit" class="btn btn-solid" style="width:100%;justify-content:center">Sign In</button>
    </form>
  </div>
</div>

<!-- SHELL -->
<div class="crm-shell" id="crm-shell">
  <div class="crm-nav" id="crm-nav">
    <h3>AMC CRM</h3>
    <a class="active" data-tab="production">Production</a>
    <a class="owner-only" data-tab="ledger">Ledger</a>
    <a class="owner-only" data-tab="sold">Sold</a>
    <div style="border-top:1px solid var(--line);padding-top:8px;margin:6px 0">
      <a href="/admin">→ Website Admin</a>
      <a href="/">→ Public Site</a>
    </div>
    <div class="logout-row">
      <div id="crm-nav-user" style="margin-bottom:6px"></div>
      <button class="btn btn-ghost owner-only" style="width:100%;justify-content:center;padding:8px;font-size:.7rem;margin-bottom:4px" id="crm-backup-btn">💾 Backup</button>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;padding:8px;font-size:.7rem" id="crm-logout-btn">Log Out</button>
    </div>
  </div>

  <div class="crm-main">
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi"><div class="label">In Production</div><div class="value" id="kpi-count">—</div></div>
      <div class="kpi owner-only" id="kpi-cap-wrap"><div class="label">Capital Invested</div><div class="value" id="kpi-capital">—</div></div>
      <div class="kpi owner-only" id="kpi-sold-wrap"><div class="label">Units Sold</div><div class="value" id="kpi-sold">—</div></div>
      <div class="kpi owner-only" id="kpi-profit-wrap"><div class="label">Gross Profit</div><div class="value" id="kpi-profit">—</div></div>
    </div>

    <!-- PRODUCTION -->
    <div class="crm-tab active" id="tab-production">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
        <div style="display:flex;gap:8px">
          <input type="text" id="prod-search" placeholder="Search stock, year, make, model…" style="padding:10px 14px;border:1px solid var(--line);background:var(--black);color:#fff;font-family:'Inter';font-size:.85rem;min-width:240px">
          <select id="prod-loc-filter" style="padding:10px 14px;border:1px solid var(--line);background:var(--black);color:#fff;font-family:'Inter';font-size:.85rem">
            <option value="all">All Locations</option>
          </select>
        </div>
        <button class="btn btn-solid" style="font-size:.78rem;padding:10px 20px" id="crm-add-vehicle">+ Add Vehicle</button>
      </div>
      <div id="prod-list"></div>
    </div>

    <!-- LEDGER -->
    <div class="crm-tab" id="tab-ledger">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
        <input type="text" id="ledger-search" placeholder="Search…" style="padding:10px 14px;border:1px solid var(--line);background:var(--black);color:#fff;font-family:'Inter';font-size:.85rem;min-width:200px">
        <button class="btn btn-ghost" style="font-size:.72rem;padding:10px 16px" id="ledger-export">Export CSV</button>
      </div>
      <div class="wide-table-wrap" id="ledger-wrap"></div>
    </div>

    <!-- SOLD -->
    <div class="crm-tab" id="tab-sold">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
        <input type="text" id="sold-search" placeholder="Search buyer, seller, vehicle…" style="padding:10px 14px;border:1px solid var(--line);background:var(--black);color:#fff;font-family:'Inter';font-size:.85rem;min-width:200px">
        <button class="btn btn-ghost" style="font-size:.72rem;padding:10px 16px" id="sold-export">Export CSV</button>
      </div>
      <div class="wide-table-wrap" id="sold-wrap"></div>
    </div>
  </div>
</div>

<!-- MODAL ZONE -->
<div id="crm-modals"></div>

<script src="/crm.js"></script>
</body>
</html>
